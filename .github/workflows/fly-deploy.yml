name: Fly Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress deploys when a newer commit lands on main.
concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      # Non-blocking for now: the repo has pre-existing lint/format debt
      # (incl. generated routeTree.gen.ts). Flip to a hard gate once `vp check`
      # passes cleanly by removing `continue-on-error`.
      - run: vp check
        continue-on-error: true
      - run: vp test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: check
    # Only the canonical repo deploys — skip on forks.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    concurrency:
      group: fly-deploy-app
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
